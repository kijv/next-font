name: Update Font Data

on:
  # Run every every day at midnight https://crontab.guru/#0_0_*_*_*/1
  schedule:
    - cron: '0 0 * * */1'
  # Allow manual runs
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-font-data:
    name: Update font data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: '.node-version'
          cache: true
          run-install: false
      - run: vp i --frozen-lockfile
      - name: Create Pull Request
        shell: bash
        run: node scripts/automated-update-workflow.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: fonts-data
          SCRIPT: packages/next-font/scripts/update-google-fonts.ts && vp check --fix
          PR_TITLE: Update font data
          PR_BODY: This auto-generated PR updates font data with latest available
