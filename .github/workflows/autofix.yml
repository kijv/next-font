name: autofix.ci

on:
  pull_request:
    branches: ['update/*']
  push:
    branches: ['update/*']
permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: false
      - run: vp i --frozen-lockfile
      - run: vp run build
      - run: vp check --fix
      - uses: autofix-ci/action@7a166d7532b277f34e16238930461bf77f9d7ed8
