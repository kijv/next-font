packages:
  - packages/*
  - examples/*
  - scripts
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.11
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
overrides:
